.intro-formulario,
#formulario,
.confirmacao {
    margin-bottom: 18px;
    padding: clamp(18px, 3vw, 28px);
}

.intro-formulario h2,
.confirmacao h2 {
    margin-bottom: 8px;
}

fieldset {
    border: 0;
}

fieldset legend {
    color: #1b1f3b;
    font-size: 1.35rem;
    font-weight: bold;
    margin-bottom: 14px;
}

label {
    display: block;
    font-weight: bold;
    margin-top: 12px;
}

input[type="text"],
input[type="email"],
input[type="date"],
input[type="tel"],
select,
textarea {
    border: 1px solid #a8b3c2;
    border-radius: 6px;
    font: inherit;
    margin-top: 6px;
    padding: 11px 12px;
    width: 100%;
}

textarea {
    resize: vertical;
}

input:focus,
select:focus,
textarea:focus {
    border-color: #c62828;
    outline: 3px solid rgba(198, 40, 40, 0.18);
}

.linha-checkbox {
    align-items: center;
    display: flex;
    gap: 10px;
    font-weight: normal;
}

.linha-checkbox input {
    height: 18px;
    width: 18px;
}

button,
.botao-link {
    background-color: #c62828;
    border: 0;
    border-radius: 6px;
    color: #fff;
    cursor: pointer;
    display: inline-block;
    font: inherit;
    font-weight: bold;
    margin-top: 18px;
    padding: 12px 18px;
    text-align: center;
    text-decoration: none;
}

button {
    width: 100%;
}

button:hover,
button:focus,
.botao-link:hover,
.botao-link:focus {
    background-color: #9f1f1f;
    outline: none;
}

.dados-confirmacao {
    display: grid;
    gap: 10px 16px;
    grid-template-columns: 180px minmax(0, 1fr);
    margin-top: 20px;
}

.dados-confirmacao dt {
    color: #1b1f3b;
    font-weight: bold;
}

.dados-confirmacao dd {
    overflow-wrap: anywhere;
}

@media (max-width: 600px) {
    .dados-confirmacao {
        gap: 4px;
        grid-template-columns: 1fr;
    }

    .dados-confirmacao dd {
        margin-bottom: 10px;
    }
}
