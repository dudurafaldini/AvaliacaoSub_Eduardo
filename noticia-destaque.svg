* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    background-color: #f4f6f8;
    color: #1f2933;
    font-family: Arial, Helvetica, sans-serif;
    line-height: 1.6;
}

img {
    display: block;
    max-width: 100%;
}

a {
    color: inherit;
}

.pular-conteudo {
    background-color: #fff;
    color: #111827;
    left: 12px;
    padding: 10px 14px;
    position: absolute;
    top: -60px;
    z-index: 10;
}

.pular-conteudo:focus {
    top: 12px;
}

.topo {
    align-items: center;
    background-color: #1b1f3b;
    color: #fff;
    display: flex;
    gap: 18px;
    justify-content: space-between;
    padding: 22px clamp(16px, 4vw, 48px);
}

.marca {
    align-items: center;
    display: flex;
    gap: 14px;
    margin: 0;
}

.logo {
    background-color: #fff;
    border-radius: 50%;
    height: 78px;
    padding: 6px;
    width: 78px;
}

.marca figcaption {
    display: grid;
    gap: 2px;
}

.marca span {
    color: #ffc857;
    font-size: 0.85rem;
    font-weight: bold;
    text-transform: uppercase;
}

.marca strong {
    font-size: 1.35rem;
}

.topo h1 {
    font-size: clamp(1.4rem, 3vw, 2.4rem);
    line-height: 1.1;
    max-width: 620px;
}

nav {
    background-color: #c62828;
    color: #fff;
    padding: 0 clamp(16px, 4vw, 48px);
}

nav ul {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
    list-style: none;
}

nav a {
    display: block;
    font-weight: bold;
    padding: 14px 18px;
    text-decoration: none;
}

nav a:hover,
nav a:focus,
nav a[aria-current="page"] {
    background-color: #9f1f1f;
    outline: none;
}

.conteudo {
    align-items: start;
    display: grid;
    gap: 24px;
    grid-template-columns: minmax(0, 1fr) 320px;
    margin: 30px auto;
    width: min(1180px, calc(100% - 32px));
}

main,
aside,
.intro-formulario,
#formulario,
.confirmacao {
    background-color: #fff;
    border: 1px solid #d9dee5;
    border-radius: 8px;
    box-shadow: 0 8px 24px rgba(31, 41, 51, 0.06);
}

main {
    padding: clamp(18px, 3vw, 32px);
}

.cabecalho-noticia {
    border-bottom: 1px solid #d9dee5;
    margin-bottom: 22px;
    padding-bottom: 18px;
}

.tag {
    color: #c62828;
    font-size: 0.85rem;
    font-weight: bold;
    text-transform: uppercase;
}

.noticia h2 {
    color: #111827;
    font-size: clamp(1.7rem, 4vw, 3rem);
    line-height: 1.1;
    margin: 8px 0;
}

.resumo {
    color: #4b5563;
    font-size: 1.1rem;
}

.meta,
figcaption {
    color: #697586;
    font-size: 0.9rem;
}

figure {
    margin: 20px 0;
}

figure img {
    background-color: #eef2f7;
    border: 1px solid #d9dee5;
    border-radius: 8px;
    width: 100%;
}

figcaption {
    margin-top: 8px;
}

article section + section {
    margin-top: 22px;
}

h2,
h3 {
    color: #1b1f3b;
}

h3 {
    margin-bottom: 8px;
}

.grade-noticias {
    border-top: 1px solid #d9dee5;
    display: grid;
    gap: 14px;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    margin-top: 24px;
    padding-top: 22px;
}

.grade-noticias h2 {
    grid-column: 1 / -1;
}

.cartao {
    background-color: #f8fafc;
    border: 1px solid #d9dee5;
    border-radius: 8px;
    padding: 16px;
}

aside {
    padding: 22px;
}

aside h2 {
    font-size: 1.2rem;
    margin-bottom: 10px;
}

aside h2:not(:first-child) {
    border-top: 1px solid #d9dee5;
    margin-top: 22px;
    padding-top: 22px;
}

.lista-lateral {
    padding-left: 20px;
}

.lista-lateral li + li {
    margin-top: 8px;
}

footer {
    background-color: #1b1f3b;
    color: #fff;
    padding: 22px;
    text-align: center;
}

footer a {
    color: #fff;
}

.pagina-formulario {
    background: transparent;
    border: 0;
    box-shadow: none;
    margin: 30px auto;
    padding: 0;
    width: min(760px, calc(100% - 32px));
}

@media (max-width: 768px) {
    .topo {
        align-items: flex-start;
        flex-direction: column;
    }

    nav ul {
        justify-content: flex-start;
    }

    nav a {
        padding: 12px;
    }

    .conteudo {
        grid-template-columns: 1fr;
    }

    .grade-noticias {
        grid-template-columns: 1fr;
    }
}
